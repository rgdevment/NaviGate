name: linkunbound
description: LinkUnbound — Browser picker for Windows. Intercepts link clicks and lets you choose which browser opens them.
version: 1.0.0
publish_to: none
repository: https://github.com/rgdevment/LinkUnbound

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  linkunbound_core:
    path: ../../packages/core
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  window_manager: ^0.5.1
  system_tray: ^2.0.3
  win32_registry: ^1.1.5
  ffi: ^2.1.3
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0

msix_config:
  display_name: LinkUnbound - Browser Picker
  publisher_display_name: RGDevment
  publisher: CN=AC154EDC-DBFC-482B-AF3B-A1A6FF12DA84
  identity_name: rgdevment.LinkUnbound-BrowserPicker
  store: true
  capabilities: internetClient
  languages: en-us, es-es
  logo_path: assets/app_icon.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/app_icon.ico
    - assets/app_icon.png
    - assets/copypaste_icon.png
