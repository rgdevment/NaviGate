name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            version:
                description: "Version to release (e.g. 1.0.0 or 1.0.0-beta.1)"
                required: false
                default: "1.0.0-dev"

permissions:
    contents: write

jobs:
    extract-version:
        runs-on: ubuntu-latest
        name: Extract Version
        outputs:
            version: ${{ steps.get_version.outputs.VERSION }}
        steps:
            - name: Resolve version
              id: get_version
              run: |
                  if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
                    VERSION="${{ github.event.inputs.version }}"
                  elif [[ "$GITHUB_REF" =~ refs/tags/v(.+) ]]; then
                    VERSION="${BASH_REMATCH[1]}"
                  else
                    VERSION="1.0.0"
                  fi
                  echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Resolved version: $VERSION"

    build-windows:
        needs: extract-version
        uses: ./.github/workflows/release-win.yml
        with:
            version: ${{ needs.extract-version.outputs.version }}
        secrets: inherit

    github-release:
        runs-on: ubuntu-latest
        needs: [extract-version, build-windows]
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 10
        name: Create GitHub Release

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}
                  fetch-depth: 0

            - name: Extract tag message
              id: tag_message
              run: |
                  MSG=$(git tag -l --format='%(contents:subject)%0a%0a%(contents:body)' "${{ github.ref_name }}" | sed '/-----BEGIN SSH SIGNATURE-----/,$d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
                  echo "TAG_BODY<<EOF" >> $GITHUB_OUTPUT
                  echo "$MSG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Download Windows artifacts
              uses: actions/download-artifact@v7
              with:
                  name: release-windows
                  path: artifacts/windows

            - name: List artifacts
              run: find artifacts/ -type f

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  body: ${{ steps.tag_message.outputs.TAG_BODY }}
                  generate_release_notes: true
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  make_latest: true
                  files: |
                      artifacts/windows/**/*_Setup.exe
                      artifacts/windows/**/*_store.msix*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

