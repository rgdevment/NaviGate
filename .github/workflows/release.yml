name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            version:
                description: "Version to release (e.g. 1.0.0 or 1.0.0-beta.1)"
                required: false
                default: "1.0.0-dev"

permissions:
    contents: write

jobs:
    extract-version:
        runs-on: ubuntu-latest
        name: Extract Version
        outputs:
            version: ${{ steps.get_version.outputs.VERSION }}
        steps:
            - name: Resolve version
              id: get_version
              run: |
                  if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
                    VERSION="${{ github.event.inputs.version }}"
                  elif [[ "$GITHUB_REF" =~ refs/tags/v(.+) ]]; then
                    VERSION="${BASH_REMATCH[1]}"
                  else
                    VERSION="1.0.0"
                  fi
                  echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Resolved version: $VERSION"

    build-windows:
        needs: extract-version
        uses: ./.github/workflows/release-win.yml
        with:
            version: ${{ needs.extract-version.outputs.version }}
        secrets: inherit

    build-macos:
        needs: extract-version
        uses: ./.github/workflows/release-mac.yml
        with:
            version: ${{ needs.extract-version.outputs.version }}
        secrets: inherit

    github-release:
        runs-on: ubuntu-latest
        needs: [extract-version, build-windows, build-macos]
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 10
        name: Create GitHub Release

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}
                  fetch-depth: 0

            - name: Extract tag message
              id: tag_message
              run: |
                  MSG=$(git tag -l --format='%(contents:subject)%0a%0a%(contents:body)' "${{ github.ref_name }}" | sed '/-----BEGIN SSH SIGNATURE-----/,$d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
                  echo "TAG_BODY<<EOF" >> $GITHUB_OUTPUT
                  echo "$MSG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Download Windows artifacts
              uses: actions/download-artifact@v7
              with:
                  name: release-windows
                  path: artifacts/windows

            - name: Download macOS artifacts
              uses: actions/download-artifact@v7
              with:
                  name: release-macos
                  path: artifacts/macos

            - name: List artifacts
              run: find artifacts/ -type f

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  body: ${{ steps.tag_message.outputs.TAG_BODY }}
                  generate_release_notes: true
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  make_latest: true
                  files: |
                      artifacts/windows/**/*_Setup.exe
                      artifacts/windows/**/*_store.msix*
                      artifacts/macos/**/*.dmg
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    update-homebrew-cask:
        runs-on: ubuntu-latest
        needs: github-release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 5
        name: Update Homebrew Tap

        steps:
            - name: Update Homebrew Tap
              env:
                  GH_TOKEN: ${{ secrets.GIST_TOKEN }}
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  VERSION="${TAG#v}"

                  DMG_NAME="LinkUnbound_${VERSION}_universal.dmg"
                  DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${DMG_NAME}"

                  echo "Downloading DMG to compute SHA256..."
                  curl -fSL -o "/tmp/${DMG_NAME}" "${DMG_URL}"
                  DMG_SHA256=$(sha256sum "/tmp/${DMG_NAME}" | awk '{print $1}')
                  rm -f "/tmp/${DMG_NAME}"

                  echo "Version: ${VERSION}"
                  echo "DMG SHA256: ${DMG_SHA256}"

                  if [[ "$VERSION" == *-* ]]; then
                    CASK_FILE="Casks/linkunbound-beta.rb"
                    CASK_NAME="linkunbound-beta"
                    CASK_DESC="Smart browser router for HTTP(S) links (beta)"
                  else
                    CASK_FILE="Casks/linkunbound.rb"
                    CASK_NAME="linkunbound"
                    CASK_DESC="Smart browser router for HTTP(S) links"
                  fi

                  git clone "https://x-access-token:${GH_TOKEN}@github.com/rgdevment/homebrew-tap.git" /tmp/homebrew-tap
                  cd /tmp/homebrew-tap

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  mkdir -p Casks

                  cat > "${CASK_FILE}" <<- CASK_EOF
                  	cask "${CASK_NAME}" do
                  	  version "${VERSION}"
                  	  sha256 "${DMG_SHA256}"

                  	  url "${DMG_URL}"
                  	  name "LinkUnbound"
                  	  desc "${CASK_DESC}"
                  	  homepage "https://github.com/${{ github.repository }}"

                  	  depends_on macos: ">= :ventura"

                  	  app "LinkUnbound.app"

                  	  zap trash: [
                  	    "~/Library/Application Support/com.rgdevment.linkunbound",
                  	    "~/Library/Preferences/com.rgdevment.linkunbound.plist",
                  	  ]
                  	end
                  CASK_EOF

                  git add "${CASK_FILE}"
                  git commit -m "Update ${CASK_NAME} to ${VERSION}"
                  git push origin main

                  echo "Homebrew Tap updated: cask ${CASK_NAME} → ${VERSION}"

    publish-to-store:
        runs-on: windows-latest
        needs: [extract-version, github-release]
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(needs.extract-version.outputs.version, '-')
        timeout-minutes: 15
        name: Publish to Microsoft Store

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}
                  fetch-depth: 0

            - name: Install Microsoft Store Developer CLI
              uses: microsoft/microsoft-store-apppublisher@v1.3

            - name: Download Windows artifacts
              uses: actions/download-artifact@v7
              with:
                  name: release-windows
                  path: artifacts/windows

            - name: Find MSIX package
              id: find_msix
              shell: bash
              run: |
                  MSIX=$(find artifacts/windows -name "*.msixupload" | head -1)
                  [ -z "$MSIX" ] && MSIX=$(find artifacts/windows -name "*.msixbundle" | head -1)
                  [ -z "$MSIX" ] && MSIX=$(find artifacts/windows -name "*.msix" | head -1)
                  if [ -z "$MSIX" ]; then
                    echo "Error: No MSIX package found in release-windows artifact"
                    find artifacts/windows -type f
                    exit 1
                  fi
                  echo "MSIX_PATH=$MSIX" >> $GITHUB_OUTPUT
                  echo "Found: $MSIX"

            - name: Configure Microsoft Store CLI
              shell: bash
              run: |
                  msstore reconfigure \
                    --tenantId "${{ secrets.STORE_TENANT_ID }}" \
                    --sellerId "${{ secrets.STORE_SELLER_ID }}" \
                    --clientId "${{ secrets.STORE_CLIENT_ID }}" \
                    --clientSecret "${{ secrets.STORE_CLIENT_SECRET }}"

            - name: Publish to Microsoft Store
              shell: bash
              run: |
                  msstore publish "${{ steps.find_msix.outputs.MSIX_PATH }}" \
                    --appId "${{ vars.STORE_APP_ID }}"
