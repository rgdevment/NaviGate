name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0 or 1.0.0-beta.1)'
        required: true
        default: '1.0.0-dev'

jobs:
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Extract version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Version: $VERSION"
          echo "Prerelease: $(if [[ "$VERSION" == *-* ]]; then echo true; else echo false; fi)"

  build-windows:
    name: Build Windows
    needs: extract-version
    uses: ./.github/workflows/release-win.yml
    with:
      version: ${{ needs.extract-version.outputs.version }}
    secrets: inherit

  github-release:
    name: GitHub Release
    needs: [extract-version, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Extract tag message
        id: tag_message
        run: |
          MSG=$(git tag -l --format='%(contents:body)' "${{ github.ref_name }}" | sed '/-----BEGIN SSH SIGNATURE-----/,$d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          echo "TAG_BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Windows artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-windows
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.extract-version.outputs.version }}
          name: LinkUnbound v${{ needs.extract-version.outputs.version }}
          body: ${{ steps.tag_message.outputs.TAG_BODY }}
          prerelease: ${{ needs.extract-version.outputs.prerelease == 'true' }}
          generate_release_notes: true
          make_latest: true
          files: |
            artifacts/**/*_Setup.exe
            artifacts/**/*_store.msix*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
