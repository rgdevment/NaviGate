name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            *.md
            .github/**/*.md
          config: ".markdownlint.yaml"
        continue-on-error: true

  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: melos analyze

      - name: Check auto-fixable issues
        run: |
          OUTPUT=$(dart fix --dry-run . 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Nothing to fix!" || { echo "::error::Auto-fixable issues found. Run 'dart fix --apply' and commit."; exit 1; }

      - name: Run core tests with coverage
        working-directory: packages/core
        run: |
          dart pub global activate coverage
          dart test --coverage=coverage
          dart pub global run coverage:format_coverage \
            --lcov \
            --in=coverage \
            --out=coverage/lcov.info \
            --report-on=lib

      - name: Run app tests with coverage
        working-directory: apps/linkunbound
        run: flutter test --coverage

      - name: Merge coverage reports
        run: |
          sed 's|^SF:lib/|SF:apps/linkunbound/lib/|g' apps/linkunbound/coverage/lcov.info > /tmp/app_lcov.info
          sed 's|^SF:lib/|SF:packages/core/lib/|g' packages/core/coverage/lcov.info > /tmp/core_lcov.info
          cat /tmp/core_lcov.info /tmp/app_lcov.info > coverage-merged.info

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage-merged.info

  codecov:
    name: Codecov
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/coverage-merged.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  sonarcloud:
    name: SonarCloud
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Resolve dependencies
        run: |
          cd packages/core && dart pub get
          cd ../../apps/linkunbound && flutter pub get

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=packages/core/lib,apps/linkunbound/lib
            -Dsonar.tests=packages/core/test,apps/linkunbound/test
            -Dsonar.dart.lcov.reportPaths=coverage/coverage-merged.info
            -Dsonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/l10n/app_localizations_*.dart,**/l10n/app_localizations.dart
            -Dsonar.coverage.exclusions=**/main.dart,**/app.dart,**/platform/**,**/update_service.dart,**/picker_window.dart,**/settings_window.dart,**/settings_view.dart,**/title_bar.dart

  build:
    name: Build (${{ matrix.name }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            build_cmd: flutter build windows --release
          - os: macos-15
            name: macOS
            build_cmd: flutter build macos --release
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build ${{ matrix.name }} release
        working-directory: apps/linkunbound
        run: ${{ matrix.build_cmd }}
