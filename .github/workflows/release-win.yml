name: Release Windows

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        shell: pwsh
        run: |
          $v = "${{ inputs.version }}"
          $clean = $v -replace '-.*$', ''
          $parts = $clean.Split('.')
          $major = if ($parts.Length -ge 1) { $parts[0] } else { '0' }
          $minor = if ($parts.Length -ge 2) { $parts[1] } else { '0' }
          $patch = if ($parts.Length -ge 3) { $parts[2] } else { '0' }
          $msixVersion = "$major.$minor.$patch.0"
          $prerelease = if ($v -match '-') { 'true' } else { 'false' }

          "msix_version=$msixVersion" | Out-File -Append $env:GITHUB_OUTPUT
          "prerelease=$prerelease" | Out-File -Append $env:GITHUB_OUTPUT

          Write-Host "Version: $v"
          Write-Host "MSIX Version: $msixVersion"
          Write-Host "Prerelease: $prerelease"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install fastforge
        run: dart pub global activate fastforge

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Update pubspec version
        shell: pwsh
        working-directory: apps/linkunbound
        run: |
          $content = Get-Content pubspec.yaml -Raw
          $content = $content -replace 'version: .*', "version: ${{ inputs.version }}+1"
          Set-Content pubspec.yaml $content

      - name: Build standalone EXE (Inno Setup)
        working-directory: apps/linkunbound
        run: fastforge package --platform windows --targets exe

      - name: Sign installer
        if: env.PFX_BASE64 != ''
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        shell: pwsh
        working-directory: apps/linkunbound
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:PFX_BASE64)
          $pfxPath = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1

          $installer = Get-ChildItem "dist\*-setup.exe" | Select-Object -First 1

          & $signtool.FullName sign /f $pfxPath /p $env:PFX_PASSWORD /fd SHA256 `
            /tr "http://timestamp.digicert.com" /td SHA256 $installer.FullName

          Remove-Item $pfxPath -Force

      - name: Rename installer
        shell: pwsh
        working-directory: apps/linkunbound
        run: |
          $installer = Get-ChildItem "dist\*-setup.exe" | Select-Object -First 1
          $newName = "LinkUnbound_${{ inputs.version }}_x64_Setup.exe"
          Rename-Item $installer.FullName $newName

      - name: Build MSIX (Store)
        if: steps.version.outputs.prerelease == 'false'
        working-directory: apps/linkunbound
        run: fastforge package --platform windows --targets msix

      - name: Rename MSIX
        if: steps.version.outputs.prerelease == 'false'
        shell: pwsh
        working-directory: apps/linkunbound
        run: |
          $msix = Get-ChildItem "dist\*.msix" | Select-Object -First 1
          if ($msix) {
            $newName = "LinkUnbound_${{ inputs.version }}_x64_store.msix"
            Rename-Item $msix.FullName $newName
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: apps/linkunbound/dist/LinkUnbound_*
